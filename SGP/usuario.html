<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuário</title>
</head>

<body>

    <header>
        <h1>Usuário</h1>
    </header>

    <h2>Adicionar novo Usuário</h2>
    <form>
        <label for="nome">Nome:*</label><br>
        <!-- <input type="text" id="nome" name="nome" placeholder="Digite o nome" value="Jefferson Queiroz" readonly><br><br> -->

        <label for="cpf">CPF:*</label><br>

        <label for="dnascimento">Data de nascimento:*</label><br>
        <input type="date" id="dnascimento" name="dnascimento"><br><br>

        <label for="status">Status:*</label><br>
        <!-- <select id="status" name="status" size="3" multiple> -->

            <option value="#" selected>Selecione</option>
            <option value="ATIVO">ATIVO</option>
            <option value="BLOQUEADO">BLOQUEADO</option>
            <option value="INATIVO">INATIVO</option>
        </select><br><br>
        <label for="status">Senha temporária:*</label><br>

        <label for=""></label>
        <input type="password" id="password" name="password"><br><br>

        <!-- <input type="submit" value="Salvar">
        <input type="submit" value="Cancelar"> -->
        <input type="button" onclick="alert('Cadastrado com sucesso!')" value="Enviar">

</body>
