      </ul>

   </div>
   <div class="conteiner">

      <form>

         <label for="nomeProjeto">Nome do Projeto</label><br>
         <input type="text" id="nomeProjeto" name="nomeProjeto"><br><br>

         <label for="descricaoProjeto">Descrição do Projeto</label><br>
         <textarea id="descricaoProjeto" name="descricaoProjeto"></textarea><br><br>

         <label for="dtCriacaoProjeto">Data de Criação do Projeto</label>
         <input type="date" id="dtCriacaoProjeto" name="dtCriacaoProjeto">

         <label for="dtConclusaoProjeto">Data de Conclusão do Projeto</label>
         <input type="date" id="dtConclusaoProjeto" name="dtConclusaoProjeto"><br><br>

         <label for="statusProjeto">Status</label><br>
         <select id="statusProjeto" name="statusProjeto">
            <option value="">SELECIONE</option>
            <option value="pendente">PENDENTE</option>
            <option value="andamento">ANDAMENTO</option>
            <option value="concluido">CONCLUIDO</option>
            <option value="entregue">ENTREGUE</option>
         </select>

         <label for="responsavelProjeto">Responsável</label>
         <input type="text" id="responsavelProjeto" name="responsavelProjeto"><br><br>

         <button type="submit" onclick="alert('Projeto Salvo com Sucesso!!')" id="btnSalvarProjeto">Salvar</button>

      </form>
   </div>
